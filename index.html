<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWO Prozess-Baukasten — Kartensatz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #f5f3ef; color: #1a1a1a; }

.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #f5f3ef; border-bottom: 1px solid #e0ddd7;
  padding: 16px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.toolbar h1 { font-size: 18px; font-weight: 700; margin-right: 16px; }
.filter-btn {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid #d0cdc6;
  background: transparent; font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { background: #e8e5de; }
.filter-btn.active { color: #fff; border-color: transparent; }
.filter-btn[data-cat="ALL"].active { background: #444; }
.filter-btn[data-cat="START"].active { background: #2563a8; }
.filter-btn[data-cat="INPUT"].active { background: #1c5e63; }
.filter-btn[data-cat="MODELL"].active { background: #0f7060; }
.filter-btn[data-cat="AUSGABE"].active { background: #9e4420; }
.filter-btn[data-cat="MENSCH"].active { background: #5a3290; }
.filter-btn[data-cat="BEDENKEN"].active { background: #96650e; }

.print-btn {
  margin-left: auto; padding: 8px 20px; border-radius: 8px;
  background: #1a1a1a; color: #fff; border: none; font-family: inherit;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s;
}
.print-btn:hover { background: #333; }

.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; padding: 24px; max-width: 1280px; margin: 0 auto;
}

.card {
  background: #fff; border-radius: 12px; overflow: hidden;
  border: 1px solid #e0ddd7; display: flex; flex-direction: column;
  min-height: 320px; transition: box-shadow 0.15s;
  break-inside: avoid; page-break-inside: avoid;
}
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

.card-header {
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
}
.card-icon {
  width: 28px; height: 28px; border-radius: 6px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.card-icon svg { width: 16px; height: 16px; }
.card-cat {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
}

.card-body { padding: 4px 20px 16px; flex: 1; display: flex; flex-direction: column; }
.card-title { font-size: 18px; font-weight: 700; line-height: 1.25; margin-bottom: 8px; }
.card-desc { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #666; line-height: 1.55; }

.card.blank .card-body { justify-content: flex-start; padding-top: 16px; }
.card.blank .card-title { color: #aaa; font-weight: 500; font-style: italic; font-size: 15px; }

/* Category colors */
.cat-START .card-header { background: #dbeafe; }
.cat-START .card-icon { background: #93bbf0; }
.cat-START .card-icon svg { stroke: #1e4f8a; fill: none; }
.cat-START .card-cat { color: #1e4f8a; }

.cat-INPUT .card-header { background: #d4ecec; }
.cat-INPUT .card-icon { background: #7ec0c0; }
.cat-INPUT .card-icon svg { stroke: #1c5e63; fill: none; }
.cat-INPUT .card-cat { color: #1c5e63; }

.cat-MODELL .card-header { background: #d1f5e8; }
.cat-MODELL .card-icon { background: #7edbb8; }
.cat-MODELL .card-icon svg { stroke: #0a5e4a; fill: none; }
.cat-MODELL .card-cat { color: #0a5e4a; }

.cat-AUSGABE .card-header { background: #fde8df; }
.cat-AUSGABE .card-icon { background: #f0b196; }
.cat-AUSGABE .card-icon svg { stroke: #7a3315; fill: none; }
.cat-AUSGABE .card-cat { color: #7a3315; }

.cat-MENSCH .card-header { background: #ede2f5; }
.cat-MENSCH .card-icon { background: #b8a3dc; }
.cat-MENSCH .card-icon svg { stroke: #4a2c7e; fill: none; }
.cat-MENSCH .card-cat { color: #4a2c7e; }

.cat-BEDENKEN .card-header { background: #fef3d6; }
.cat-BEDENKEN .card-icon { background: #f0c860; }
.cat-BEDENKEN .card-icon svg { stroke: #6b4005; fill: none; }
.cat-BEDENKEN .card-cat { color: #6b4005; }

.cat-HINWEIS .card-header { background: #e8e7e2; }
.cat-HINWEIS .card-icon { background: #c4c3bc; }
.cat-HINWEIS .card-icon svg { stroke: #4a4a47; fill: none; }
.cat-HINWEIS .card-cat { color: #4a4a47; }

/* Cover card — white, top accent strip, no badge icon */
.cat-COVER { border-top: 5px solid #1a1a1a; }
.cat-COVER .card-header { background: #fff; padding: 18px 20px 0; }
.cat-COVER .card-icon { display: none; }
.cat-COVER .card-cat { color: #888; }
.cat-COVER .card-body { justify-content: center; padding: 8px 22px 24px; }
.cat-COVER .card-title { font-size: 22px; line-height: 1.2; margin-bottom: 14px; }
.cat-COVER .card-desc { color: #555; font-size: 11.5px; line-height: 1.65; }

.status {
  padding: 24px; color: #888; font-size: 14px;
}
.status.error { color: #a03030; }
.status code { font-family: 'IBM Plex Mono', monospace; font-size: 13px; background: #f0ede5; padding: 2px 6px; border-radius: 4px; }

@media print { .toolbar { display: none !important; } }
</style>
</head>
<body>

<div class="toolbar">
  <h1>Prozess-Baukasten</h1>
  <button class="filter-btn active" data-cat="ALL" onclick="filter('ALL', this)">Alle</button>
  <button class="filter-btn" data-cat="START" onclick="filter('START', this)">Start</button>
  <button class="filter-btn" data-cat="INPUT" onclick="filter('INPUT', this)">Input</button>
  <button class="filter-btn" data-cat="MODELL" onclick="filter('MODELL', this)">Sprachmodell</button>
  <button class="filter-btn" data-cat="AUSGABE" onclick="filter('AUSGABE', this)">Ausgabe</button>
  <button class="filter-btn" data-cat="MENSCH" onclick="filter('MENSCH', this)">Mensch</button>
  <button class="filter-btn" data-cat="BEDENKEN" onclick="filter('BEDENKEN', this)">Bedenken</button>
  <select id="printSelect" style="margin-left:auto; padding:6px 10px; border-radius:8px; border:1.5px solid #d0cdc6; font-family:inherit; font-size:13px; background:#fff;">
    <option value="ALL">Alle drucken</option>
    <option value="START">Nur Start</option>
    <option value="INPUT">Nur Input</option>
    <option value="MODELL">Nur Sprachmodell</option>
    <option value="AUSGABE">Nur Ausgabe</option>
    <option value="MENSCH">Nur Mensch</option>
    <option value="BEDENKEN">Nur Bedenken</option>
  </select>
  <button class="print-btn" onclick="printCards()">Drucken (4 pro Seite)</button>
</div>

<div class="grid" id="grid">
  <p class="status">Karten werden geladen …</p>
</div>

<script>
const LABELS = {
  COVER: 'Cover',
  START: 'Start',
  INPUT: 'Input',
  MODELL: 'Sprachmodell',
  AUSGABE: 'Ausgabe',
  MENSCH: 'Mensch',
  BEDENKEN: 'Bedenken',
  HINWEIS: 'Hinweis'
};

const ICONS = {
  START: '<svg viewBox="0 0 16 16" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="4,2 13,8 4,14" fill="none"/></svg>',
  INPUT: '<svg viewBox="0 0 16 16" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="8" cy="3.5" rx="5" ry="1.5" fill="none"/><path d="M3 3.5 V 12.5 C 3 13.3 5.2 14 8 14 C 10.8 14 13 13.3 13 12.5 V 3.5" fill="none"/><path d="M3 8 C 3 8.8 5.2 9.5 8 9.5 C 10.8 9.5 13 8.8 13 8" fill="none"/></svg>',
  MODELL: '<svg viewBox="0 0 16 16" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="1.5" width="12" height="13" rx="2" fill="none"/><line x1="5" y1="5.5" x2="11" y2="5.5"/><line x1="5" y1="8.5" x2="11" y2="8.5"/><line x1="5" y1="11.5" x2="9" y2="11.5"/></svg>',
  AUSGABE: '<svg viewBox="0 0 16 16" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="8" x2="13" y2="8"/><polyline points="9,4 13,8 9,12"/></svg>',
  MENSCH: '<svg viewBox="0 0 16 16" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="5" r="2.8" fill="none"/><path d="M2.5,15 C2.5,11 5,9 8,9 C11,9 13.5,11 13.5,15" fill="none"/></svg>',
  BEDENKEN: '<svg viewBox="0 0 16 16" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="8,1.5 15,14 1,14" fill="none"/><line x1="8" y1="6.5" x2="8" y2="10"/><circle cx="8" cy="12" r="0.5" fill="currentColor" stroke="none"/></svg>',
  HINWEIS: '<svg viewBox="0 0 16 16" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="3" cy="3" r="1.5" fill="none"/><circle cx="13" cy="13" r="1.5" fill="none"/><path d="M3 4.5 L 3 8 L 13 8 L 13 11.5" fill="none"/></svg>'
};

const CATEGORIES = [
  { code: 'COVER',    file: 'content/cover.md' },
  { code: 'START',    file: 'content/start.md' },
  { code: 'INPUT',    file: 'content/input.md' },
  { code: 'MODELL',   file: 'content/sprachmodell.md' },
  { code: 'AUSGABE',  file: 'content/ausgabe.md' },
  { code: 'MENSCH',   file: 'content/mensch.md' },
  { code: 'BEDENKEN', file: 'content/bedenken.md' },
  { code: 'HINWEIS',  file: 'content/hinweis.md' }
];

let CARDS = [];

function parseMD(text, category) {
  const cards = [];
  const lines = text.split('\n');
  let title = null;
  let paragraphs = [[]];

  const flush = () => {
    if (title === null) return;
    const isBlank = /^\(.*\)$/.test(title);
    const desc = paragraphs
      .map(p => p.join(' ').trim())
      .filter(Boolean)
      .join('<br><br>');
    cards.push([category, isBlank ? '' : title, isBlank ? '' : desc]);
  };

  for (const raw of lines) {
    if (raw.startsWith('## ')) {
      flush();
      title = raw.slice(3).trim();
      paragraphs = [[]];
    } else if (raw.startsWith('# ')) {
      // category header — ignore
    } else if (title !== null) {
      const trimmed = raw.trim();
      if (trimmed === '') {
        if (paragraphs[paragraphs.length - 1].length > 0) paragraphs.push([]);
      } else {
        paragraphs[paragraphs.length - 1].push(trimmed);
      }
    }
  }
  flush();
  return cards;
}

async function loadCards() {
  const all = [];
  const errors = [];
  for (const { code, file } of CATEGORIES) {
    try {
      const res = await fetch(file);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      all.push(...parseMD(text, code));
    } catch (e) {
      errors.push(`${file}: ${e.message}`);
    }
  }
  return { cards: all, errors };
}

function updateCounts() {
  const counts = { ALL: CARDS.length };
  for (const { code } of CATEGORIES) {
    counts[code] = CARDS.filter(c => c[0] === code).length;
  }
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    const label = cat === 'ALL' ? 'Alle' : LABELS[cat] || cat;
    btn.textContent = `${label} (${counts[cat] || 0})`;
  });
}

function renderCards(filterCat) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  CARDS.forEach(([cat, title, desc]) => {
    if (filterCat !== 'ALL' && cat !== filterCat) return;
    const isBlank = !title;
    const card = document.createElement('div');
    card.className = `card cat-${cat}${isBlank ? ' blank' : ''}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon">${ICONS[cat] || ''}</div>
        <span class="card-cat">${LABELS[cat] || cat}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${isBlank ? 'eigene Idee:' : title}</div>
        ${!isBlank ? `<div class="card-desc">${desc}</div>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

function filter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat);
}

function printCards() {
  const sel = document.getElementById('printSelect').value;
  const filtered = sel === 'ALL' ? CARDS : CARDS.filter(c => c[0] === sel);

  const COLORS = {
    COVER:    { bg:'#fff',    icon:'#fff',    iconStroke:'#1a1a1a', text:'#888',    cover:true },
    START:    { bg:'#dbeafe', icon:'#93bbf0', iconStroke:'#1e4f8a', text:'#1e4f8a' },
    INPUT:    { bg:'#d4ecec', icon:'#7ec0c0', iconStroke:'#1c5e63', text:'#1c5e63' },
    MODELL:   { bg:'#d1f5e8', icon:'#7edbb8', iconStroke:'#0a5e4a', text:'#0a5e4a' },
    AUSGABE:  { bg:'#fde8df', icon:'#f0b196', iconStroke:'#7a3315', text:'#7a3315' },
    MENSCH:   { bg:'#ede2f5', icon:'#b8a3dc', iconStroke:'#4a2c7e', text:'#4a2c7e' },
    BEDENKEN: { bg:'#fef3d6', icon:'#f0c860', iconStroke:'#6b4005', text:'#6b4005' },
    HINWEIS:  { bg:'#e8e7e2', icon:'#c4c3bc', iconStroke:'#4a4a47', text:'#4a4a47' }
  };

  let pages = [];
  for (let i = 0; i < filtered.length; i += 4) {
    pages.push(filtered.slice(i, i + 4));
  }

  function cardHTML(cat, title, desc, pos) {
    const col = COLORS[cat];
    const isBlank = !title;
    const top = pos < 2 ? '0mm' : '148.5mm';
    const left = pos % 2 === 0 ? '0mm' : '105mm';

    if (col.cover) {
      return `
        <div style="position:absolute; top:${top}; left:${left}; width:105mm; height:148.5mm; box-sizing:border-box; background:#fff; border:0.3pt solid #d0cdc6; border-top:1.5mm solid #1a1a1a; display:flex; flex-direction:column; overflow:hidden; font-family:'DM Sans',sans-serif;">
          <div style="padding:8mm 8mm 0; flex-shrink:0;">
            <span style="font-family:'IBM Plex Mono',monospace; font-size:9pt; font-weight:500; letter-spacing:0.02em; color:${col.text};">${LABELS[cat] || cat}</span>
          </div>
          <div style="padding:6mm 8mm 8mm; flex:1; display:flex; flex-direction:column; justify-content:center;">
            <div style="font-size:18pt; font-weight:700; color:#1a1a1a; line-height:1.2; margin-bottom:6mm;">${title}</div>
            <div style="font-family:'IBM Plex Mono',monospace; font-size:9pt; color:#444; line-height:1.6;">${desc}</div>
          </div>
        </div>`;
    }

    return `
      <div style="position:absolute; top:${top}; left:${left}; width:105mm; height:148.5mm; box-sizing:border-box; border:0.3pt solid #d0cdc6; display:flex; flex-direction:column; overflow:hidden; font-family:'DM Sans',sans-serif;">
        <div style="background:${col.bg}; padding:6mm 5mm; display:flex; align-items:center; gap:3mm; flex-shrink:0;">
          <div style="width:9mm; height:9mm; border-radius:2mm; background:${col.icon}; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <svg viewBox="0 0 16 16" width="18" height="18" stroke="${col.iconStroke}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">${ICONS[cat].replace(/<svg[^>]*>/, '').replace('</svg>','')}</svg>
          </div>
          <span style="font-family:'IBM Plex Mono',monospace; font-size:10pt; font-weight:500; letter-spacing:0.02em; color:${col.text};">${LABELS[cat] || cat}</span>
        </div>
        <div style="padding:5mm 6mm; flex:1; display:flex; flex-direction:column;">
          <div style="font-size:${isBlank ? '12pt' : '15pt'}; font-weight:${isBlank ? '500' : '700'}; color:${isBlank ? '#aaa' : '#1a1a1a'}; line-height:1.3; margin-bottom:3mm; ${isBlank ? 'font-style:italic;' : ''}">${isBlank ? 'eigene Idee:' : title}</div>
          ${!isBlank ? `<div style="font-family:'IBM Plex Mono',monospace; font-size:9.5pt; color:#444; line-height:1.5;">${desc}</div>` : ''}
        </div>
      </div>`;
  }

  let html = `<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      @page { size: A4 portrait; margin: 0; }
      * { margin:0; padding:0; box-sizing:border-box; }
      body { font-family:'DM Sans',sans-serif; }
      .page { width:210mm; height:297mm; position:relative; page-break-after:always; overflow:hidden; }
      .page:last-child { page-break-after:auto; }
      @media screen {
        body { background:#e8e5de; display:flex; flex-direction:column; align-items:center; gap:16px; padding:24px; }
        .page { background:#fff; box-shadow:0 2px 20px rgba(0,0,0,0.12); flex-shrink:0; }
        .no-print { position:fixed; top:16px; right:24px; z-index:100; display:flex; gap:8px; }
        .no-print button { padding:10px 24px; border-radius:8px; border:none; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
        .no-print .print { background:#1a1a1a; color:#fff; }
        .no-print .print:hover { background:#333; }
        .no-print .close { background:#fff; color:#1a1a1a; border:1.5px solid #d0cdc6; }
      }
      @media print { .no-print { display:none !important; } }
    </style>
  </head><body>
    <div class="no-print">
      <button class="print" onclick="window.print()">Jetzt drucken</button>
      <button class="close" onclick="window.close()">Schließen</button>
    </div>`;

  pages.forEach(page => {
    html += '<div class="page">';
    page.forEach(([cat, title, desc], i) => {
      html += cardHTML(cat, title, desc, i);
    });
    html += '</div>';
  });

  html += '</body></html>';

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

(async () => {
  const grid = document.getElementById('grid');
  const { cards, errors } = await loadCards();
  if (errors.length && cards.length === 0) {
    grid.innerHTML = `
      <div class="status error">
        <strong>Karten konnten nicht geladen werden.</strong><br><br>
        Beim direkten Öffnen der Datei (<code>file://</code>) blockieren Browser den Zugriff auf die <code>content/</code>-Dateien.<br>
        Bitte über einen lokalen Server starten — z.B. im Repo-Ordner:<br>
        <code>python3 -m http.server 8000</code><br>
        und dann <code>http://localhost:8000</code> öffnen.<br><br>
        Fehlermeldungen: ${errors.map(e => `<code>${e}</code>`).join(', ')}
      </div>`;
    return;
  }
  CARDS = cards;
  updateCounts();
  renderCards('ALL');
})();
</script>
</body>
</html>
